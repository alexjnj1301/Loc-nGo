<mat-card class="reservation-card" appearance="outlined">
  <mat-card-header class="reservation-card-header">
    <div>
      <img class="reservation-card-header-image" src="https://dubaitickets.tours/wp-content/uploads/2023/03/img-worlds-of-adventure-dubai-ticket-9.jpg" alt="lieu_image">
    </div>
    <div>
      <mat-card-title>{{reservation.reference}}</mat-card-title>
      <mat-card-subtitle style="color: #a9c7da">{{reservation.start_date}}</mat-card-subtitle>
    </div>
  </mat-card-header>
</mat-card>
